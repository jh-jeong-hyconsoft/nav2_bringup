controller_server:
  ros__parameters:
    use_sim_time: false

    controller_frequency: 20.0

    min_x_velocity_threshold: 0.05
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.01

    failure_tolerance: 60.0

    progress_checker_plugin: "progress_checker"

    goal_checker_plugins:
      - "general_goal_checker"
      - "intermediate_goal_checker"
      - "final_goal_checker"

    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.10
      movement_time_allowance: 120.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.50
      yaw_goal_tolerance: 0.50

    intermediate_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.75
      yaw_goal_tolerance: 3.14

    final_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.50
      yaw_goal_tolerance: 0.50

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.5
      max_vel_y: 0.0
      max_vel_theta: 1.5

      min_speed_xy: 0.0
      max_speed_xy: 0.5
      min_speed_theta: 0.0

      acc_lim_x: 1.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.0

      decel_lim_x: -1.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.0

      vx_samples: 40
      vy_samples: 1
      vtheta_samples: 20

      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.50
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true

      critics:
        [
          "RotateToGoal",
          "Oscillation",
          "BaseObstacle",
          "GoalAlign",
          "PathAlign",
          "PathDist",
          "GoalDist",
        ]

      BaseObstacle.scale: 0.08

      PathAlign.scale: 20.0
      PathAlign.forward_point_distance: 0.1
      PathDist.scale: 20.0

      GoalAlign.scale: 16.0
      GoalAlign.forward_point_distance: 0.1
      GoalDist.scale: 18.0

      RotateToGoal.scale: 24.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false

      update_frequency: 10.0
      publish_frequency: 3.0

      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true

      width: 6
      height: 6
      resolution: 0.05
      transform_tolerance: 0.5

      footprint: "[[0.50, 0.40], [0.50, -0.40], [-0.50, -0.40], [-0.50, 0.40]]"
      footprint_padding: 0.10

      track_unknown_space: false
      always_send_full_costmap: true

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: "scan nonground"

        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_min_range: 0.0
          obstacle_max_range: 5.0
          raytrace_min_range: 0.0
          raytrace_max_range: 6.0
          min_obstacle_height: 0.05
          max_obstacle_height: 2.0
          observation_persistence: 0.0
          expected_update_rate: 0.0

        nonground:
          topic: /patchworkpp/nonground
          data_type: "PointCloud2"
          marking: true
          clearing: false
          obstacle_min_range: 0.15
          obstacle_max_range: 5.0
          raytrace_min_range: 0.0
          raytrace_max_range: 5.0
          min_obstacle_height: 0.05
          max_obstacle_height: 1.5
          observation_persistence: 0.2
          expected_update_rate: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.75
        cost_scaling_factor: 3.0

behavior_server:
  ros__parameters:
    use_sim_time: false

    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint

    cycle_frequency: 10.0

    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.5

    behavior_plugins: ["spin"]

    spin:
      plugin: "nav2_behaviors/Spin"

    simulate_ahead_time: 1.0
    max_rotational_vel: 0.5
    min_rotational_vel: 0.15
    rotational_acc_lim: 1.5

velocity_smoother:
  ros__parameters:
    use_sim_time: false

    smoothing_frequency: 20.0
    scale_velocities: true
    feedback: "OPEN_LOOP"

    max_velocity: [0.5, 0.0, 1.5]
    min_velocity: [0.0, 0.0, -1.5]
    max_accel: [1.5, 0.0, 3.0]
    max_decel: [-1.5, 0.0, -3.0]

    odom_topic: /dlio/odom_node/odom
    odom_duration: 0.1

    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    use_sim_time: false

    base_frame_id: base_link
    odom_frame_id: odom

    cmd_vel_in_topic: cmd_vel_smoothed
    cmd_vel_out_topic: cmd_vel
    state_topic: collision_monitor_state

    transform_tolerance: 0.5
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 1.0

    polygons: ["FootprintApproach", "FrontStop"]

    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: local_costmap/published_footprint
      time_before_collision: 1.0
      simulation_time_step: 0.1
      max_points: 4
      visualize: false
      enabled: true

    FrontStop:
      type: "polygon"

      points: [0.90, 0.38, 0.90, -0.38, 0.62, -0.38, 0.62, 0.38]
      action_type: "stop"
      max_points: 3
      visualize: true
      polygon_pub_topic: front_stop_polygon
      enabled: true

    observation_sources: ["nonground"]

    nonground:
      type: "pointcloud"
      topic: /patchworkpp/nonground
      transport_type: "raw"
      min_height: 0.05
      max_height: 1.5
      min_range: 0.15
      source_timeout: 1.0
      enabled: true

route_server:
  ros__parameters:
    use_sim_time: false

    base_frame: "base_link"
    route_frame: "map"

    path_density: 0.05
    max_iterations: 0
    max_planning_time: 2.0

    smooth_corners: true
    smoothing_radius: 1.0
    smoothing_angle_threshold: 2.9

    costmap_topic: "local_costmap/costmap_raw"

    tracker_update_rate: 20.0
    aggregate_blocked_ids: false
    boundary_radius_to_achieve_node: 1.0
    radius_to_achieve_node: 2.0
    max_prune_dist_from_edge: 8.0
    min_prune_dist_from_goal: 0.15
    min_prune_dist_from_start: 0.10
    prune_goal: true

    enable_nn_search: false
    max_nn_search_iterations: 10000
    num_nearest_nodes: 5

    graph_filepath: ""
    graph_file_loader: "GeoJsonGraphFileLoader"

    GeoJsonGraphFileLoader:
      plugin: "nav2_route::GeoJsonGraphFileLoader"

    edge_cost_functions:
      - "DistanceScorer"
      - "DynamicEdgesScorer"

    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"

    DynamicEdgesScorer:
      plugin: "nav2_route::DynamicEdgesScorer"

    operations:
      - "CollisionMonitor"
      - "ReroutingService"

    CollisionMonitor:
      plugin: "nav2_route::CollisionMonitor"
      costmap_topic: "local_costmap/costmap_raw"
      rate: 1.0
      max_cost: 253.0
      max_collision_dist: 3.0
      check_resolution: 1
      reroute_on_collision: true

    ReroutingService:
      plugin: "nav2_route::ReroutingService"

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    default_nav_to_pose_bt_xml: ""
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_rate_controller_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.05
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.5

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins:
      - "general_goal_checker"
      - "intermediate_goal_checker"
      - "final_goal_checker"
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.10
      movement_time_allowance: 30.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.50
      yaw_goal_tolerance: 0.50

    intermediate_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.75
      yaw_goal_tolerance: 3.14

    final_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.50
      yaw_goal_tolerance: 0.50

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 1.0
      max_vel_y: 0.0
      max_vel_theta: 1.5

      min_speed_xy: 0.0
      max_speed_xy: 1.0
      min_speed_theta: 0.0

      acc_lim_x: 1.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.0

      decel_lim_x: -1.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.0

      vx_samples: 40
      vy_samples: 1
      vtheta_samples: 20

      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.50
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true

      critics:
        [
          "RotateToGoal",
          "Oscillation",
          "BaseObstacle",
          "GoalAlign",
          "PathAlign",
          "PathDist",
          "GoalDist",
        ]

      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0

      global_frame: odom
      robot_base_frame: base_link

      rolling_window: true
      width: 8
      height: 8
      resolution: 0.05

      footprint: "[ [0.47, 0.35], [0.47, -0.35], [-0.47, -0.35], [-0.47, 0.35] ]"
      footprint_padding: 0.10

      track_unknown_space: false
      plugins: ["spatio_temporal_voxel_layer", "inflation_layer"]

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 1.0

      spatio_temporal_voxel_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true

        voxel_decay: 15.0
        decay_model: 0
        voxel_size: 0.05

        track_unknown_space: true
        unknown_threshold: 15
        mark_threshold: 0

        update_footprint_enabled: true
        combination_method: 1
        origin_z: 0.0
        publish_voxel_map: false
        transform_tolerance: 0.2

        mapping_mode: false
        map_save_duration: 60.0

        observation_sources: lidar

        lidar:
          data_type: PointCloud2
          topic: /patchworkpp/nonground
          marking: true
          clearing: true

          obstacle_range: 8.0
          min_obstacle_height: 0.10
          max_obstacle_height: 1.20

          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false

          filter: "voxel"
          voxel_min_points: 0
          clear_after_reading: true

          max_z: 8.0
          min_z: 0.10
          vertical_fov_angle: 0.785398
          vertical_fov_padding: 0.05
          horizontal_fov_angle: 6.29

          decay_acceleration: 15.0
          model_type: 1

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0

      global_frame: map
      robot_base_frame: base_link

      rolling_window: true
      width: 30
      height: 30
      resolution: 0.10

      footprint: "[ [0.47, 0.35], [0.47, -0.35], [-0.47, -0.35], [-0.47, 0.35] ]"
      footprint_padding: 0.10

      track_unknown_space: false
      plugins: ["spatio_temporal_voxel_layer", "inflation_layer"]

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 1.0

      spatio_temporal_voxel_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true

        voxel_decay: 15.0
        decay_model: 0
        voxel_size: 0.10

        track_unknown_space: false
        unknown_threshold: 15
        mark_threshold: 0

        update_footprint_enabled: true
        combination_method: 1
        origin_z: 0.0
        publish_voxel_map: false
        transform_tolerance: 0.2

        mapping_mode: false
        map_save_duration: 60.0

        observation_sources: lidar

        lidar:
          data_type: PointCloud2
          topic: /patchworkpp/nonground
          marking: true
          clearing: true

          obstacle_range: 12.0
          min_obstacle_height: 0.10
          max_obstacle_height: 1.20

          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false

          filter: "voxel"
          voxel_min_points: 0
          clear_after_reading: true

          max_z: 12.0
          min_z: 0.10
          vertical_fov_angle: 0.785398
          vertical_fov_padding: 0.05
          horizontal_fov_angle: 6.29

          decay_acceleration: 15.0
          model_type: 1

      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.50
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "REEDS_SHEPP"
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 4.0
      analytic_expansion_max_cost: 200.0
      analytic_expansion_max_cost_override: false
      minimum_turning_radius: 0.80
      reverse_penalty: 2.0
      change_penalty: 0.0
      non_straight_penalty: 1.2
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      lookup_table_size: 10.0
      cache_obstacle_heuristic: false
      debug_visualizations: false
      use_quadratic_cost_penalty: false
      downsample_obstacle_heuristic: true
      allow_primitive_interpolation: false
      smooth_path: true

      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]

    spin:
      plugin: "nav2_behaviors/Spin"

    backup:
      plugin: "nav2_behaviors/BackUp"

    wait:
      plugin: "nav2_behaviors/Wait"

    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: true
    feedback: "OPEN_LOOP"

    max_velocity: [1.0, 0.0, 1.5]
    min_velocity: [-0.5, 0.0, -1.5]
    max_accel: [1.5, 0.0, 3.0]
    max_decel: [-1.5, 0.0, -3.0]

    odom_topic: /odom
    odom_duration: 0.1

    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_link
    odom_frame_id: odom

    cmd_vel_in_topic: cmd_vel_smoothed
    cmd_vel_out_topic: cmd_vel
    state_topic: collision_monitor_state

    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: false
    stop_pub_timeout: 1.0

    polygons: ["FootprintApproach", "FrontStop"]

    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: local_costmap/published_footprint
      time_before_collision: 1.5
      simulation_time_step: 0.1
      max_points: 6
      visualize: false
      enabled: true

    FrontStop:
      type: "polygon"
      points: [1.00, 0.40, 1.00, -0.40, 0.20, -0.40, 0.20, 0.40]
      action_type: "stop"
      max_points: 4
      visualize: true
      polygon_pub_topic: front_stop_polygon
      enabled: true

    observation_sources: ["scan"]

    scan:
      type: "scan"
      topic: /ouster/scan
      min_height: 0.05
      max_height: 1.5
      enabled: true

route_server:
  ros__parameters:
    use_sim_time: false
    base_frame: "base_link"
    route_frame: "map"
    path_density: 0.05
    max_iterations: 0
    max_planning_time: 2.0
    smooth_corners: true
    smoothing_radius: 1.0
    smoothing_angle_threshold: 2.9
    costmap_topic: "local_costmap/costmap_raw"

    tracker_update_rate: 20.0
    aggregate_blocked_ids: false
    boundary_radius_to_achieve_node: 1.0
    radius_to_achieve_node: 2.0
    max_prune_dist_from_edge: 8.0
    min_prune_dist_from_goal: 0.15
    min_prune_dist_from_start: 0.10
    prune_goal: true

    enable_nn_search: false
    max_nn_search_iterations: 10000
    num_nearest_nodes: 5

    graph_filepath: ""
    graph_file_loader: "GeoJsonGraphFileLoader"
    GeoJsonGraphFileLoader:
      plugin: "nav2_route::GeoJsonGraphFileLoader"

    edge_cost_functions:
      - "DistanceScorer"
      - "DynamicEdgesScorer"
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
    DynamicEdgesScorer:
      plugin: "nav2_route::DynamicEdgesScorer"

    operations:
      - "CollisionMonitor"
      - "ReroutingService"
    CollisionMonitor:
      plugin: "nav2_route::CollisionMonitor"
      costmap_topic: "local_costmap/costmap_raw"
      rate: 1.0
      max_cost: 253.0
      max_collision_dist: 5.0
      check_resolution: 1
      reroute_on_collision: true
    ReroutingService:
      plugin: "nav2_route::ReroutingService"
